<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Validação</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  margin-top: 100px;
}

input {
  padding: 10px;
  width: 250px;
}

button {
  padding: 10px 20px;
  background: #0f7f79;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Validação de Documento</h2>

<input type="text" id="codigo" placeholder="Digite o código">
<br><br>
<button onclick="validar()">Validar</button>

<p id="erro" style="color:red; display:none;">Código inválido</p>

<script>
function validar() {
  const codigo = document.getElementById("codigo").value;

  if (codigo === "JCAT33FZSMN6JM3") {
    // redireciona para a página do documento
    window.location.href = "documento.html";
  } else {
    document.getElementById("erro").style.display = "block";
  }
}
</script>

</body>
</html>
